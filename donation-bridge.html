<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Calm MonstarZ 후원 브리지</title>
  <style>
    :root{--bg:#090d16;--panel:#111827;--line:#263244;--text:#ecf3ff;--muted:#8fa1b8;--blue:#52b9ff;--green:#42dd98;--red:#ff7586;--amber:#ffc857}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px system-ui,-apple-system,'Segoe UI',sans-serif}
    main{width:min(920px,100%);margin:0 auto;padding:28px 18px 48px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}
    h1{margin:0;font-size:22px;letter-spacing:0}h1 span{color:var(--blue)}.state{font:700 12px ui-monospace,Consolas,monospace;color:var(--muted)}
    .grid{display:grid;grid-template-columns:minmax(280px,.82fr) minmax(0,1.5fr);gap:14px}.panel{border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:16px}
    h2{margin:0 0 14px;font-size:15px}.row{display:flex;gap:8px}.field{display:grid;gap:7px}.field label{font-size:12px;font-weight:700;color:var(--muted)}
    input{width:100%;height:40px;border:1px solid var(--line);border-radius:5px;background:#080d16;color:var(--text);padding:0 11px;font:inherit}input:focus{outline:2px solid rgba(82,185,255,.32);border-color:var(--blue)}
    button{height:40px;border:1px solid #3b4c64;border-radius:5px;background:#172338;color:var(--text);padding:0 13px;font:700 13px inherit;cursor:pointer}button:hover{border-color:var(--blue)}button.primary{border-color:var(--blue);background:#166da8}button:disabled{opacity:.45;cursor:not-allowed}
    .actions{display:grid;gap:8px;margin-top:14px}.notice{min-height:38px;margin:13px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.notice.ok{color:var(--green)}.notice.bad{color:var(--red)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.stat{border:1px solid var(--line);border-radius:6px;padding:11px;background:#0b111d}.stat span{display:block;color:var(--muted);font-size:11px;font-weight:700}.stat b{display:block;margin-top:5px;font:800 20px ui-monospace,Consolas,monospace}
    .events{height:340px;overflow:auto;border:1px solid var(--line);border-radius:6px;background:#070b12;padding:8px}.event{display:grid;grid-template-columns:84px 1fr auto;gap:8px;align-items:center;padding:9px 7px;border-bottom:1px solid #172030;font-size:12px}.event:last-child{border:0}.event time{color:var(--muted);font-family:ui-monospace,Consolas,monospace}.event b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.event strong{color:var(--green);font-family:ui-monospace,Consolas,monospace}.event.skip strong{color:var(--amber)}.event.fail strong{color:var(--red)}
    @media(max-width:700px){main{padding:18px 12px}.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <main>
    <div class="top"><h1>Calm <span>MonstarZ</span> 후원 브리지</h1><div class="state" id="state">OFFLINE</div></div>
    <div class="grid">
      <section class="panel">
        <h2>방송인 연결</h2>
        <form class="field" id="authForm">
          <label for="bridgeKey">브리지 키</label>
          <input id="bridgeKey" type="password" autocomplete="off" required />
          <button class="primary" type="submit">브리지 키 인증</button>
        </form>
        <div class="actions">
          <button id="soopAuth" disabled>SOOP 계정 연결</button>
          <button id="connect" disabled>후원 수집 시작</button>
          <button id="disconnect" disabled>수집 중지</button>
        </div>
        <div class="notice" id="notice"></div>
      </section>
      <section class="panel">
        <h2>별풍선 처리</h2>
        <div class="stats"><div class="stat"><span>수집 이벤트</span><b id="eventsCount">0</b></div><div class="stat"><span>지급 포인트</span><b id="balloonsCount">0</b></div><div class="stat"><span>중복/제외</span><b id="skippedCount">0</b></div></div>
        <div class="events" id="events"><div class="event"><time>대기</time><b>SOOP 연결 후 별풍선 이벤트를 수집합니다</b><strong>-</strong></div></div>
      </section>
    </div>
  </main>
  <script>
    const SDK_URLS=[
      'https://static.sooplive.com/asset/app/sooplive-chat-sdk.js',
      'https://static.sooplive.com/asset/app/sooplive-chat-sdk.min.js',
      'https://static.sooplive.com/asset/app/chat-sdk/sooplive-chat-sdk.js',
      'https://static.sooplive.com/asset/app/chat-sdk/sooplive-chat-sdk.min.js',
      'https://static.sooplive.com/asset/app/chat-sdk/latest/chat-sdk.min.js',
      'https://static.sooplive.com/asset/app/chat-sdk/chat-sdk.min.js'
    ];
    const state={authenticated:false,connected:false,sdk:null,credentials:null,events:0,balloons:0,skipped:0};
    const $=id=>document.getElementById(id);
    function setNotice(text,kind=''){const el=$('notice');el.textContent=text;el.className='notice '+kind;}
    function render(){
      $('state').textContent=state.connected?'COLLECTING':state.authenticated?'READY':'OFFLINE';
      $('state').style.color=state.connected?'var(--green)':state.authenticated?'var(--blue)':'var(--muted)';
      $('soopAuth').disabled=!state.authenticated;
      $('connect').disabled=!state.authenticated||state.connected;
      $('disconnect').disabled=!state.connected;
      $('eventsCount').textContent=state.events;
      $('balloonsCount').textContent=state.balloons;
      $('skippedCount').textContent=state.skipped;
    }
    async function request(path,options={}){
      const response=await fetch(path,{credentials:'same-origin',...options});
      const data=await response.json().catch(()=>({}));
      if(!response.ok)throw new Error(data.error||'요청에 실패했습니다');
      return data;
    }
    function time(){return new Date().toLocaleTimeString('ko-KR',{hour12:false});}
    function eventRow(name,amount,kind=''){
      const row=document.createElement('div');row.className='event '+kind;
      row.innerHTML=`<time>${time()}</time><b></b><strong></strong>`;
      row.querySelector('b').textContent=name;
      row.querySelector('strong').textContent=amount;
      $('events').prepend(row);
    }
    function first(message,keys){
      for(const key of keys){
        const value=key.split('.').reduce((item,part)=>item&&item[part],message);
        if(value!==undefined&&value!==null&&String(value).trim())return String(value).trim();
      }
      return '';
    }
    function amount(message){return Math.floor(Number(first(message,['count','giftCount','balloonCount','amount','cnt','starballoonCount','starBalloonCount','data.count','data.giftCount','data.amount']))||0);}
    function sender(message){return first(message,['userId','senderId','fromUserId','fanId','donorId','user.id','sender.id','data.userId','data.senderId']);}
    function recipient(message){return first(message,['bjId','receiverId','broadId','streamerId','ownerId','data.bjId','data.receiverId']);}
    function nickname(message){return first(message,['userNickname','userNickName','userNick','nickname','nickName','senderNickname','senderNickName','fromNickname','fanNickname','data.userNickname','data.nickname'])||sender(message)||'알 수 없음';}
    async function eventId(action,message,senderId,recipientId,count){
      const upstream=first(message,['eventId','giftId','transactionId','donationId','id','data.eventId','data.giftId','data.transactionId']);
      if(upstream)return `soop:${action}:${upstream}`;
      // 이벤트 자체에 고유 ID/타임스탬프가 없으면 수신 시각을 섞는다 —
      // 같은 사람이 같은 수량을 다시 쏴도 별개 이벤트로 처리 (서버 중복방지는 upstream ID 있는 경우에만 실효)
      const at=first(message,['createdAt','timestamp','time','data.createdAt','data.timestamp'])||`recv:${Date.now()}:${Math.random().toString(36).slice(2,8)}`;
      const source=JSON.stringify({action,senderId,recipientId,count,at,message});
      const bytes=new TextEncoder().encode(source);
      const hash=await crypto.subtle.digest('SHA-256',bytes);
      return 'soop:'+Array.from(new Uint8Array(hash)).map(v=>v.toString(16).padStart(2,'0')).join('');
    }
    const DONATION_ACTIONS=new Set(['BALLOON_GIFTED','BATTLE_MISSION_GIFTED']);
    async function handleMessage(action,message){
      if(!DONATION_ACTIONS.has(action))return;
      // 대결미션 후원은 수신 BJ ID가 없으므로, 현재 브릿지 인증 방송인을 수신자로 쓴다.
      const senderId=sender(message),recipientId=recipient(message)||state.credentials?.soopId,count=amount(message),name=nickname(message);
      if(!senderId||!recipientId||count<1){state.skipped++;render();eventRow(`${name} · 식별 정보 부족`,'제외','skip');return;}
      try{
        const id=await eventId(action,message,senderId,recipientId,count);
        const result=await request('/api/bridge/donation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({eventId:id,senderSoopId:senderId,recipientSoopId:recipientId,amount:count})});
        const label=action==='BATTLE_MISSION_GIFTED'?'대결미션 · ':'';
        if(result.applied){state.events++;state.balloons+=count*3;eventRow(`${label}${name} → ${recipientId}`,`+${count*3}P`);}
        else{state.skipped++;eventRow(`${name} · 중복 이벤트`,'중복','skip');}
      }catch(error){state.skipped++;eventRow(`${name} · ${error.message}`,'실패','fail');}
      render();
    }
    function loadScript(url){return new Promise((resolve,reject)=>{if([...document.scripts].some(script=>script.src===url))return resolve();const script=document.createElement('script');script.src=url;script.async=true;script.onload=resolve;script.onerror=reject;document.head.appendChild(script);});}
    async function chatSdk(){
      if(window.SOOP&&window.SOOP.ChatSDK)return window.SOOP.ChatSDK;
      if(window.ChatSDK)return window.ChatSDK;
      let lastError;
      for(const url of SDK_URLS){try{await loadScript(url);if(window.SOOP&&window.SOOP.ChatSDK)return window.SOOP.ChatSDK;if(window.ChatSDK)return window.ChatSDK;}catch(error){lastError=error;}}
      throw lastError||new Error('SOOP ChatSDK를 불러오지 못했습니다');
    }
    async function connect(){
      try{
        setNotice('SOOP ChatSDK 연결 중');
        state.credentials=await request('/api/bridge/credentials');
        const ChatSDK=await chatSdk();
        try{state.sdk=new ChatSDK(state.credentials.clientId);}catch(error){state.sdk=new ChatSDK(state.credentials.clientId,'');}
        if(typeof state.sdk.init==='function')state.sdk.init();
        state.sdk.handleMessageReceived((action,message)=>handleMessage(action,message));
        state.sdk.handleChatClosed(()=>{state.connected=false;render();setNotice('SOOP 채팅 연결이 종료되었습니다','bad');});
        state.sdk.handleError((code,message)=>{setNotice(`SOOP 오류: ${code||message||'unknown'}`,'bad');});
        state.sdk.setAuth(state.credentials.accessToken);
        await state.sdk.connect();
        state.connected=true;render();setNotice(`수집 중 · ${state.credentials.soopId}`,'ok');
      }catch(error){state.connected=false;render();setNotice(error.message,'bad');}
    }
    function disconnect(){try{if(state.sdk&&typeof state.sdk.disconnect==='function')state.sdk.disconnect();}catch(error){}state.connected=false;render();setNotice('수집을 중지했습니다');}
    async function refresh(){
      try{const result=await request('/api/bridge/status');state.authenticated=result.authenticated;render();if(state.authenticated)setNotice(result.connected?'SOOP 연결 준비됨':'방송인 키 인증됨','ok');}
      catch(error){setNotice(error.message,'bad');}
    }
    $('authForm').addEventListener('submit',async event=>{event.preventDefault();try{await request('/api/bridge/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bridgeKey:$('bridgeKey').value})});$('bridgeKey').value='';state.authenticated=true;render();setNotice('방송인 키 인증됨','ok');}catch(error){setNotice(error.message,'bad');}});
    $('soopAuth').addEventListener('click',()=>{location.href='/api/bridge/soop-start';});
    $('connect').addEventListener('click',connect);
    $('disconnect').addEventListener('click',disconnect);
    const params=new URLSearchParams(location.search);if(params.has('connected')){history.replaceState(null,'',location.pathname);setNotice('SOOP 인증 완료. 수집을 시작하세요.','ok');}if(params.has('error')){history.replaceState(null,'',location.pathname);setNotice('SOOP 인증에 실패했습니다','bad');}refresh();render();
  </script>
</body>
</html>
