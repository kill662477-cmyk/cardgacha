<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calm MonstarZ 카드뽑기 - 점검 중</title>
<style>
  :root{--bg:#0a0e1a;--panel:#111827;--accent:#2fc1ff;--text:#e5ecf5;--dim:#8b98ad}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#0f1830 0%,var(--bg) 70%);color:var(--text);font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;text-align:center;padding:24px}
  .box{max-width:480px}
  .logo{width:120px;height:120px;object-fit:contain;margin:0 auto 28px;display:block;filter:drop-shadow(0 0 24px rgba(47,193,255,.35))}
  h1{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:12px}
  h1 b{color:var(--accent)}
  p{color:var(--dim);font-size:15px;line-height:1.7}
  .badge{display:inline-block;margin-top:24px;padding:8px 18px;border:1px solid rgba(47,193,255,.4);border-radius:999px;color:var(--accent);font-size:13px;letter-spacing:.08em}
  @media (prefers-reduced-motion: no-preference){
    .badge{animation:pulse 2.4s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  }
</style>
</head>
<body>
  <div class="box">
    <img class="logo" src="/assets/card-back.jpg" alt="Calm MonstarZ"/>
    <h1><b>대규모 패치</b> 점검 중</h1>
    <p>Calm MonstarZ 카드뽑기가 더 커져서 돌아옵니다.<br/>모든 계정은 초기화되며, 패치 후 새로 시작합니다.</p>
    <div class="badge">SEASON RESET IN PROGRESS</div>
  </div>
</body>
</html>
